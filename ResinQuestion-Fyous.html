document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>The Resin Question — Fyous<\u002Ftitle>\n<style>/* =========================================================================\n   FYOUS DESIGN SYSTEM — Foundations\n   Colors, type, spacing, motion. CSS variables only.\n   Import this file once and reference vars everywhere downstream.\n   ========================================================================= */\n\n/* ---------- Fonts -------------------------------------------------------- */\n\n@font-face {\n  font-family: \"Founders Grotesk\";\n  src: url(\"0929d477-552f-43a9-ae4d-e64e76ed306a\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"OCR B\";\n  src: url(\"90376485-4cbb-4160-9996-765c6bfe8acc\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ---------- Color: Brand core --------------------------------------- */\n  /* Fyous lives almost entirely on black. Teal is the single accent —\n     the colour of the machine's process light + UI screen. Use it\n     SPARINGLY, as a moment of life inside an otherwise industrial palette. */\n\n  --fy-black:       #000000;   /* True black — the canonical background */\n  --fy-near-black:  #0A0A0A;   /* Section backgrounds, deep surfaces */\n  --fy-coal:        #141414;   /* Cards, raised surfaces on black */\n  --fy-graphite:    #1F1F1F;   /* Borders, dividers, subtle elevation */\n  --fy-iron:        #2B2B2B;   /* Hover surfaces, input wells */\n  --fy-steel:       #4A4A4A;   /* Disabled, deep secondary text on dark */\n  --fy-aluminium:   #8A8A8A;   /* Secondary text on dark */\n  --fy-mist:        #BFBFBF;   /* Tertiary / labels on dark */\n  --fy-bone:        #E6E6E6;   /* Body text on dark, surfaces on light */\n  --fy-paper:       #F4F4F2;   /* Light sections (rare) */\n  --fy-white:       #FFFFFF;   /* Primary text on dark */\n\n  /* ---------- Color: Accent — Polymorphic Teal ------------------------ */\n  /* Sampled from the PF-01 machine screen / process lighting.\n     A cool aqueous green-cyan — not minty, not corporate teal. */\n\n  --fy-teal:        #18C8A4;   /* Primary accent — buttons, highlights */\n  --fy-teal-bright: #2EE3B8;   /* Glow / focus ring centre */\n  --fy-teal-deep:   #0E8A72;   /* Pressed states, deep accent */\n  --fy-teal-shade:  #07382D;   /* Tinted dark backgrounds (machine bay) */\n  --fy-teal-wash:   rgba(24, 200, 164, 0.12);  /* Subtle tint overlays */\n\n  /* ---------- Color: Semantic ---------------------------------------- */\n  --fy-success:     #18C8A4;   /* Re-uses brand teal */\n  --fy-warning:     #E8B53A;   /* Amber — warning indicators */\n  --fy-danger:      #E5503A;   /* Red — error, stop */\n  --fy-info:        #6FB7E8;   /* Cool blue — informational */\n\n  /* ---------- Surfaces & semantic mapping ---------------------------- */\n  --fy-bg:          var(--fy-black);\n  --fy-bg-elev-1:   var(--fy-near-black);\n  --fy-bg-elev-2:   var(--fy-coal);\n  --fy-surface:     var(--fy-coal);\n  --fy-border:      var(--fy-graphite);\n  --fy-border-strong: var(--fy-iron);\n\n  --fy-fg:          var(--fy-white);\n  --fy-fg-1:        var(--fy-white);    /* Primary text */\n  --fy-fg-2:        var(--fy-bone);     /* Body */\n  --fy-fg-3:        var(--fy-mist);     /* Secondary */\n  --fy-fg-4:        var(--fy-aluminium);/* Tertiary, labels */\n  --fy-fg-mute:     var(--fy-steel);    /* Disabled, micro-copy */\n  --fy-accent:      var(--fy-teal);\n  --fy-accent-fg:   var(--fy-black);    /* Text on teal */\n\n  /* ---------- Typography: Families ------------------------------------ */\n  --fy-font-display: \"Founders Grotesk\", \"Neue Haas Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n  --fy-font-body:    \"Founders Grotesk\", \"Neue Haas Grotesk\", \"Helvetica Neue\", Arial, sans-serif;\n  --fy-font-mono:    \"OCR B\", \"OCR-B\", \"IBM Plex Mono\", \"Courier New\", monospace;\n\n  /* ---------- Typography: Scale -------------------------------------- */\n  /* Tight, industrial. Display is BIG and confident; mono labels are small. */\n  --fy-size-3xs:    10px;\n  --fy-size-2xs:    11px;   /* Mono caps labels */\n  --fy-size-xs:     12px;   /* Mono caption */\n  --fy-size-sm:     14px;\n  --fy-size-base:   16px;\n  --fy-size-md:     18px;\n  --fy-size-lg:     22px;\n  --fy-size-xl:     28px;\n  --fy-size-2xl:    36px;\n  --fy-size-3xl:    48px;\n  --fy-size-4xl:    64px;\n  --fy-size-5xl:    88px;\n  --fy-size-6xl:    120px;\n  --fy-size-display:160px;\n\n  /* ---------- Typography: Line height + tracking --------------------- */\n  --fy-lh-tight:    0.95;     /* Display headlines — almost touching */\n  --fy-lh-snug:     1.08;\n  --fy-lh-base:     1.32;\n  --fy-lh-loose:    1.5;\n\n  --fy-track-tight: -0.02em;  /* Display */\n  --fy-track-base:  -0.01em;  /* Body */\n  --fy-track-mono:  0.04em;   /* Mono labels */\n  --fy-track-caps:  0.12em;   /* All-caps eyebrows */\n\n  /* ---------- Spacing (4px base) ------------------------------------- */\n  --fy-space-0:   0;\n  --fy-space-1:   4px;\n  --fy-space-2:   8px;\n  --fy-space-3:   12px;\n  --fy-space-4:   16px;\n  --fy-space-5:   24px;\n  --fy-space-6:   32px;\n  --fy-space-7:   48px;\n  --fy-space-8:   64px;\n  --fy-space-9:   96px;\n  --fy-space-10:  128px;\n  --fy-space-11:  192px;\n\n  /* ---------- Radii --------------------------------------------------- */\n  /* Fyous skews SHARP. Default is 0. Small radii for inputs, never pill. */\n  --fy-radius-0:  0px;\n  --fy-radius-1:  2px;\n  --fy-radius-2:  4px;\n  --fy-radius-3:  8px;\n  --fy-radius-pill: 999px; /* Used only for tag pills, sparingly */\n\n  /* ---------- Borders ------------------------------------------------- */\n  --fy-stroke-hair: 1px;\n  --fy-stroke:      1px;\n  --fy-stroke-thick:2px;\n\n  /* ---------- Shadows ------------------------------------------------- */\n  /* Soft dark-on-dark elevation; teal glow for active states. */\n  --fy-shadow-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 4px 12px rgba(0,0,0,0.6);\n  --fy-shadow-2: 0 1px 0 rgba(255,255,255,0.05) inset, 0 12px 28px rgba(0,0,0,0.7);\n  --fy-glow-teal:    0 0 0 1px var(--fy-teal), 0 0 24px rgba(46, 227, 184, 0.45);\n  --fy-glow-teal-sm: 0 0 0 1px var(--fy-teal), 0 0 12px rgba(46, 227, 184, 0.35);\n\n  /* ---------- Motion -------------------------------------------------- */\n  --fy-ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);\n  --fy-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --fy-ease-mech:   cubic-bezier(0.83, 0, 0.17, 1);  /* Mechanical, decisive */\n  --fy-dur-fast:    140ms;\n  --fy-dur-base:    220ms;\n  --fy-dur-slow:    420ms;\n\n  /* ---------- Layout -------------------------------------------------- */\n  --fy-content-max: 1440px;\n  --fy-gutter:      32px;\n}\n\n/* =========================================================================\n   Semantic typography classes — apply directly or copy into components\n   ========================================================================= */\n\n.fy-display,\nh1.fy {\n  font-family: var(--fy-font-display);\n  font-size: var(--fy-size-5xl);\n  line-height: var(--fy-lh-tight);\n  letter-spacing: var(--fy-track-tight);\n  color: var(--fy-fg-1);\n  font-weight: 400;\n  margin: 0;\n}\n\n.fy-display-xl {\n  font-family: var(--fy-font-display);\n  font-size: clamp(56px, 9vw, var(--fy-size-display));\n  line-height: var(--fy-lh-tight);\n  letter-spacing: var(--fy-track-tight);\n  font-weight: 400;\n  margin: 0;\n}\n\nh2.fy, .fy-h2 {\n  font-family: var(--fy-font-display);\n  font-size: var(--fy-size-3xl);\n  line-height: var(--fy-lh-snug);\n  letter-spacing: var(--fy-track-tight);\n  font-weight: 400;\n  margin: 0;\n}\n\nh3.fy, .fy-h3 {\n  font-family: var(--fy-font-display);\n  font-size: var(--fy-size-2xl);\n  line-height: var(--fy-lh-snug);\n  letter-spacing: var(--fy-track-base);\n  font-weight: 400;\n  margin: 0;\n}\n\nh4.fy, .fy-h4 {\n  font-family: var(--fy-font-display);\n  font-size: var(--fy-size-xl);\n  line-height: var(--fy-lh-snug);\n  font-weight: 400;\n  margin: 0;\n}\n\np.fy, .fy-body {\n  font-family: var(--fy-font-body);\n  font-size: var(--fy-size-base);\n  line-height: var(--fy-lh-base);\n  letter-spacing: var(--fy-track-base);\n  color: var(--fy-fg-2);\n  margin: 0;\n}\n\n.fy-body-lg {\n  font-family: var(--fy-font-body);\n  font-size: var(--fy-size-md);\n  line-height: var(--fy-lh-base);\n  color: var(--fy-fg-2);\n}\n\n.fy-eyebrow {\n  /* The bracketed [01] / SECTION style */\n  font-family: var(--fy-font-mono);\n  font-size: var(--fy-size-2xs);\n  letter-spacing: var(--fy-track-caps);\n  text-transform: uppercase;\n  color: var(--fy-fg-3);\n}\n\n.fy-mono {\n  font-family: var(--fy-font-mono);\n  font-size: var(--fy-size-xs);\n  letter-spacing: var(--fy-track-mono);\n  color: var(--fy-fg-3);\n}\n\n.fy-mono-sm {\n  font-family: var(--fy-font-mono);\n  font-size: var(--fy-size-2xs);\n  letter-spacing: var(--fy-track-mono);\n  color: var(--fy-fg-4);\n  text-transform: uppercase;\n}\n\n.fy-caption {\n  font-family: var(--fy-font-body);\n  font-size: var(--fy-size-sm);\n  line-height: var(--fy-lh-base);\n  color: var(--fy-fg-3);\n}\n\n/* Bracketed counter — [01], [02] */\n.fy-bracket {\n  font-family: var(--fy-font-mono);\n  font-size: var(--fy-size-xs);\n  letter-spacing: var(--fy-track-mono);\n  color: var(--fy-fg-3);\n}\n\n/* Curly-brace wrapper — {polymorphic} style */\n.fy-curly::before { content: \"{\"; color: var(--fy-fg-3); margin-right: 0.05em; }\n.fy-curly::after  { content: \"}\"; color: var(--fy-fg-3); margin-left: 0.05em; }\n\n/* Founders Grotesk Regular is the only weight shipped — kill synthesis so\n   browsers don't fake-bold headings. Apply globally. */\n:where(html, body, h1, h2, h3, h4, h5, h6, strong, b, th) {\n  font-weight: 400;\n  font-synthesis: none;\n  -webkit-font-synthesis: none;\n}\n\n/* Body-applied defaults for design-system pages */\nbody.fy-canvas {\n  background: var(--fy-bg);\n  color: var(--fy-fg-2);\n  font-family: var(--fy-font-body);\n  font-size: var(--fy-size-base);\n  line-height: var(--fy-lh-base);\n  letter-spacing: var(--fy-track-base);\n  margin: 0;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n<\u002Fstyle>\n\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    background: var(--fy-black);\n    color: var(--fy-fg-2);\n    font-family: var(--fy-font-body);\n    font-size: 17px;\n    line-height: 1.55;\n    letter-spacing: -0.005em;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  a { color: inherit; text-decoration: none; }\n  img { display: block; max-width: 100%; }\n\n  /* ----- Selection ------------------------------------------------- */\n  ::selection { background: var(--fy-teal); color: var(--fy-black); }\n\n  /* ----- Top nav --------------------------------------------------- */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 16px 32px;\n    background: rgba(0,0,0,0.78);\n    backdrop-filter: blur(16px);\n    border-bottom: 1px solid var(--fy-graphite);\n  }\n  .nav__brand { display: flex; align-items: center; gap: 14px; }\n  .nav__brand img { height: 18px; opacity: 0.95; }\n  .nav__brand .doc {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--fy-fg-3);\n    padding-left: 14px; border-left: 1px solid var(--fy-graphite);\n  }\n  .nav__meta {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--fy-fg-3);\n    display: flex; gap: 24px;\n  }\n  .nav__meta .dot { color: var(--fy-teal); margin-right: 6px; }\n\n  /* ----- Cover ----------------------------------------------------- */\n  .cover {\n    position: relative; min-height: 92vh;\n    padding: 120px 48px 64px;\n    overflow: hidden;\n    border-bottom: 1px solid var(--fy-graphite);\n  }\n  .cover__bg { position: absolute; inset: 0; z-index: 0; }\n  .cover__bg img {\n    width: 100%; height: 100%; object-fit: cover;\n    opacity: 0.32; filter: grayscale(0.45) contrast(1.05);\n  }\n  .cover__scrim {\n    position: absolute; inset: 0; z-index: 1;\n    background:\n      radial-gradient(60% 40% at 80% 20%, rgba(7,56,45,0.55), transparent 70%),\n      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.92) 90%);\n  }\n  .cover__inner {\n    position: relative; z-index: 2;\n    max-width: 1280px; margin: 0 auto;\n    display: grid;\n    grid-template-rows: 1fr auto auto;\n    min-height: calc(92vh - 184px);\n    gap: 64px;\n  }\n  .cover__topmeta {\n    display: flex; gap: 48px; align-items: flex-start;\n    padding-top: 16px;\n  }\n  .cover__topmeta .col {\n    display: flex; flex-direction: column; gap: 8px;\n    min-width: 160px;\n  }\n  .cover__topmeta .label {\n    font-family: var(--fy-font-mono); font-size: 10px;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--fy-fg-4);\n  }\n  .cover__topmeta .value {\n    font-family: var(--fy-font-mono); font-size: 13px;\n    letter-spacing: 0.06em; color: var(--fy-fg-1);\n  }\n  .cover__title h1 {\n    font-family: var(--fy-font-display);\n    font-size: clamp(64px, 10.5vw, 168px);\n    line-height: 0.92; letter-spacing: -0.03em;\n    font-weight: 400; margin: 0; color: var(--fy-fg-1);\n    text-wrap: balance;\n  }\n  .cover__title h1 em { font-style: normal; color: var(--fy-teal); }\n  .cover__sub {\n    margin-top: 28px; max-width: 56ch;\n    font-family: var(--fy-font-display);\n    font-size: clamp(20px, 1.8vw, 28px);\n    line-height: 1.25; letter-spacing: -0.01em;\n    color: var(--fy-fg-3);\n  }\n  .cover__sub em { font-style: normal; color: var(--fy-fg-1); }\n  .cover__foot {\n    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;\n    gap: 24px; padding-top: 24px;\n    border-top: 1px solid var(--fy-graphite);\n  }\n  .cover__foot .cell { display: flex; flex-direction: column; gap: 6px; }\n  .cover__foot .label {\n    font-family: var(--fy-font-mono); font-size: 10px;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--fy-fg-4);\n  }\n  .cover__foot .value {\n    font-family: var(--fy-font-mono); font-size: 13px;\n    color: var(--fy-fg-1); letter-spacing: 0.04em;\n  }\n\n  /* ----- Section frame --------------------------------------------- */\n  .section { padding: 112px 48px; border-bottom: 1px solid var(--fy-graphite); }\n  .section--alt { background: var(--fy-near-black); }\n  .container { max-width: 1280px; margin: 0 auto; }\n  .grid {\n    display: grid;\n    grid-template-columns: 1fr 2.2fr;\n    gap: 64px;\n    align-items: start;\n  }\n  .grid--exec { grid-template-columns: 1fr 2fr; gap: 80px; }\n\n  /* Column header (left rail) */\n  .colhead { position: sticky; top: 96px; }\n  .colhead .num {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.16em; color: var(--fy-fg-4);\n    text-transform: uppercase;\n  }\n  .colhead .num .br { color: var(--fy-fg-mute); }\n  .colhead .kicker {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.16em; color: var(--fy-teal);\n    text-transform: uppercase; margin-top: 16px;\n  }\n  .colhead h2 {\n    margin: 18px 0 0;\n    font-family: var(--fy-font-display);\n    font-size: clamp(40px, 4.6vw, 72px);\n    line-height: 0.96; letter-spacing: -0.025em;\n    font-weight: 400; color: var(--fy-fg-1);\n    text-wrap: balance;\n  }\n  .colhead .meta {\n    margin-top: 32px;\n    padding-top: 16px;\n    border-top: 1px solid var(--fy-graphite);\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.1em;\n    color: var(--fy-fg-3);\n    display: flex; flex-direction: column; gap: 6px;\n  }\n\n  /* Body column */\n  .body p {\n    margin: 0 0 22px;\n    font-size: 17.5px; line-height: 1.62;\n    color: var(--fy-fg-2);\n    max-width: 64ch;\n  }\n  .body p.lede {\n    font-family: var(--fy-font-display);\n    font-size: clamp(24px, 2.2vw, 32px);\n    line-height: 1.28; letter-spacing: -0.012em;\n    color: var(--fy-fg-1);\n    margin-bottom: 40px;\n    max-width: 30ch;\n  }\n  .body p.lede em { font-style: normal; color: var(--fy-teal); }\n  .body h3 {\n    margin: 56px 0 18px;\n    font-family: var(--fy-font-display);\n    font-size: 26px; line-height: 1.15; letter-spacing: -0.01em;\n    font-weight: 400; color: var(--fy-fg-1);\n    display: flex; align-items: baseline; gap: 16px;\n  }\n  .body h3::before {\n    content: attr(data-num);\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.16em;\n    color: var(--fy-teal);\n    flex: 0 0 auto;\n  }\n  .body strong, .body b {\n    color: var(--fy-fg-1); font-weight: 400;\n    border-bottom: 1px solid var(--fy-iron);\n    padding-bottom: 1px;\n  }\n  .body em { font-style: normal; color: var(--fy-fg-1); }\n\n  /* ----- Pull stat blocks ------------------------------------------ */\n  .stats {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    gap: 1px; background: var(--fy-graphite);\n    border: 1px solid var(--fy-graphite);\n    margin: 32px 0 8px;\n  }\n  .stat { background: var(--fy-black); padding: 28px 24px; display: flex; flex-direction: column; gap: 10px; }\n  .stat .v {\n    font-family: var(--fy-font-display);\n    font-size: 56px; line-height: 0.95;\n    letter-spacing: -0.025em; color: var(--fy-teal);\n  }\n  .stat .v sup { font-size: 28px; vertical-align: super; }\n  .stat .l {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--fy-fg-3);\n  }\n  .stat .n {\n    font-size: 14px; line-height: 1.45;\n    color: var(--fy-fg-3);\n    margin-top: auto;\n  }\n\n  /* Workflow comparison */\n  .workflows {\n    display: grid; grid-template-columns: 1fr 1fr;\n    gap: 1px; background: var(--fy-graphite);\n    border: 1px solid var(--fy-graphite);\n    margin: 24px 0 32px;\n  }\n  .wf { background: var(--fy-black); padding: 28px; display: flex; flex-direction: column; gap: 12px; }\n  .wf .tag {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--fy-teal);\n  }\n  .wf h4 {\n    font-family: var(--fy-font-display); font-weight: 400;\n    font-size: 24px; line-height: 1.1; letter-spacing: -0.01em;\n    margin: 0; color: var(--fy-fg-1);\n  }\n  .wf p { font-size: 15px; color: var(--fy-fg-3); margin: 0; line-height: 1.5; }\n  .wf .chain {\n    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;\n    margin-top: 8px;\n  }\n  .wf .chain .step {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.06em;\n    padding: 6px 10px; border: 1px solid var(--fy-iron);\n    color: var(--fy-fg-2);\n    text-transform: uppercase;\n  }\n  .wf .chain .step.is-resin { color: var(--fy-teal); border-color: var(--fy-teal); }\n  .wf .chain .arr { color: var(--fy-fg-mute); font-family: var(--fy-font-mono); font-size: 12px; }\n\n  /* Callout */\n  .callout {\n    margin: 32px 0;\n    padding: 28px 32px;\n    border: 1px solid var(--fy-graphite);\n    border-left: 1px solid var(--fy-teal);\n    background: var(--fy-teal-wash);\n    display: flex; flex-direction: column; gap: 10px;\n  }\n  .callout .tag {\n    font-family: var(--fy-font-mono); font-size: 10px;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--fy-teal);\n  }\n  .callout p {\n    margin: 0; max-width: none;\n    font-family: var(--fy-font-display);\n    font-size: 22px; line-height: 1.3;\n    letter-spacing: -0.005em; color: var(--fy-fg-1);\n  }\n\n  /* Source row inline */\n  .src {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.06em; color: var(--fy-fg-4);\n  }\n\n  /* ----- Closing block --------------------------------------------- */\n  .closing {\n    padding: 120px 48px;\n    background: var(--fy-black);\n    border-bottom: 1px solid var(--fy-graphite);\n    position: relative; overflow: hidden;\n  }\n  .closing__bg {\n    position: absolute; inset: 0; z-index: 0;\n  }\n  .closing__bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.18; filter: grayscale(0.4); }\n  .closing__bg::after {\n    content: \"\"; position: absolute; inset: 0;\n    background: radial-gradient(50% 60% at 70% 50%, rgba(7,56,45,0.45), transparent 70%);\n  }\n  .closing__inner {\n    position: relative; z-index: 1;\n    max-width: 1280px; margin: 0 auto;\n  }\n  .closing .eyebrow {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--fy-teal);\n  }\n  .closing h2 {\n    font-family: var(--fy-font-display);\n    font-size: clamp(48px, 6.4vw, 104px);\n    line-height: 0.96; letter-spacing: -0.025em;\n    font-weight: 400; color: var(--fy-fg-1);\n    margin: 24px 0 0; max-width: 22ch;\n    text-wrap: balance;\n  }\n  .closing h2 em { font-style: normal; color: var(--fy-teal); }\n  .closing__cta-row {\n    margin-top: 48px;\n    display: flex; gap: 16px; flex-wrap: wrap;\n  }\n  .cta {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    padding: 16px 22px;\n    border: 1px solid transparent;\n    transition: all 200ms cubic-bezier(0.83,0,0.17,1);\n    display: inline-flex; align-items: center; gap: 12px;\n  }\n  .cta--primary { background: var(--fy-teal); color: var(--fy-black); }\n  .cta--primary:hover { box-shadow: var(--fy-glow-teal); }\n  .cta--ghost { border-color: var(--fy-iron); color: var(--fy-fg-1); }\n  .cta--ghost:hover { border-color: var(--fy-teal); color: var(--fy-teal); }\n\n  /* ----- Footer ---------------------------------------------------- */\n  .footer { padding: 56px 48px 40px; }\n  .footer__inner {\n    max-width: 1280px; margin: 0 auto;\n    display: grid; grid-template-columns: 1.4fr 1fr 1fr;\n    gap: 48px; align-items: start;\n  }\n  .footer .disclaim {\n    font-size: 13px; line-height: 1.55; color: var(--fy-fg-3);\n    max-width: 56ch;\n  }\n  .footer .disclaim h4 {\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--fy-fg-4); margin: 0 0 10px; font-weight: 400;\n  }\n  .footer .col { display: flex; flex-direction: column; gap: 10px; }\n  .footer .col .label {\n    font-family: var(--fy-font-mono); font-size: 10px;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--fy-fg-4);\n  }\n  .footer .col .v {\n    font-family: var(--fy-font-mono); font-size: 13px;\n    color: var(--fy-fg-2); letter-spacing: 0.04em;\n  }\n  .footer__base {\n    max-width: 1280px; margin: 64px auto 0;\n    padding-top: 20px; border-top: 1px solid var(--fy-graphite);\n    display: flex; justify-content: space-between;\n    font-family: var(--fy-font-mono); font-size: 11px;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--fy-fg-4);\n  }\n  .footer__base img { height: 14px; opacity: 0.7; }\n  .footer__brand { display: flex; align-items: center; gap: 12px; }\n\n  /* Curly mark inline */\n  .curly { font-family: var(--fy-font-mono); }\n  .curly::before { content: \"{\"; color: var(--fy-fg-3); }\n  .curly::after  { content: \"}\"; color: var(--fy-fg-3); }\n\n  /* ----- Responsive ------------------------------------------------ */\n  @media (max-width: 960px) {\n    .grid, .grid--exec { grid-template-columns: 1fr; gap: 40px; }\n    .colhead { position: static; }\n    .stats { grid-template-columns: 1fr; }\n    .workflows { grid-template-columns: 1fr; }\n    .cover__foot { grid-template-columns: 1fr 1fr; }\n    .footer__inner { grid-template-columns: 1fr; }\n    .nav__meta { display: none; }\n    .section { padding: 72px 24px; }\n    .cover { padding: 96px 24px 48px; }\n  }\n\n  /* ----- Print ----------------------------------------------------- */\n  @media print {\n    body { background: white; color: black; }\n    .nav, .closing__cta-row { display: none; }\n    .section, .closing, .cover { border-color: #ddd; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav class=\"nav\">\n  <div class=\"nav__brand\">\n    <img src=\"fc955b4c-baee-4780-9e54-419aabb59a73\" alt=\"Fyous\">\n    <span class=\"doc\">White Paper · 01<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"nav__meta\">\n    <span><span class=\"dot\">●<\u002Fspan>Industry Report<\u002Fspan>\n    <span>April 2026<\u002Fspan>\n    <span>Sheffield, UK<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============== COVER ============== -->\n<header class=\"cover\">\n  <div class=\"cover__bg\"><img src=\"c54f946f-c6e7-4208-9dd0-a62e0d73552a\" alt=\"\"><\u002Fdiv>\n  <div class=\"cover__scrim\"><\u002Fdiv>\n  <div class=\"cover__inner\">\n    <div class=\"cover__topmeta\">\n      <div class=\"col\">\n        <span class=\"label\">Document<\u002Fspan>\n        <span class=\"value\">[01 / WHITEPAPER]<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"col\">\n        <span class=\"label\">Sector<\u002Fspan>\n        <span class=\"value\">DENTAL · ORTHODONTICS<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"col\">\n        <span class=\"label\">Issued<\u002Fspan>\n        <span class=\"value\">APR 2026 · v1.0<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover__title\">\n      <h1>The Resin<br>Question<em>.<\u002Fem><\u002Fh1>\n      <p class=\"cover__sub\">\n        Toxicity, exposure, and environmental cost of <em>3D printing resins<\u002Fem> in dental aligner manufacturing.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"cover__foot\">\n      <div class=\"cell\"><span class=\"label\">Audience<\u002Fspan><span class=\"value\">Clinicians · Lab Operators · Regulators<\u002Fspan><\u002Fdiv>\n      <div class=\"cell\"><span class=\"label\">Length<\u002Fspan><span class=\"value\">≈ 12 min read<\u002Fspan><\u002Fdiv>\n      <div class=\"cell\"><span class=\"label\">Sections<\u002Fspan><span class=\"value\">[01] – [05]<\u002Fspan><\u002Fdiv>\n      <div class=\"cell\"><span class=\"label\">Published by<\u002Fspan><span class=\"value\">FYOUS LTD · <span class=\"curly\">polymorphic<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============== EXECUTIVE SUMMARY ============== -->\n<section class=\"section\">\n  <div class=\"container\">\n    <div class=\"grid grid--exec\">\n      <aside class=\"colhead\">\n        <div class=\"num\">[<span class=\"br\">00<\u002Fspan>] / Executive Summary<\u002Fdiv>\n        <div class=\"kicker\">Begin Here<\u002Fdiv>\n        <h2>The chemistry deserves more scrutiny than it currently receives.<\u002Fh2>\n        <div class=\"meta\">\n          <span>3 RISK DOMAINS<\u002Fspan>\n          <span>14M+ PATIENTS TREATED<\u002Fspan>\n          <span>0 UK WELS FOR KEY VOCS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Faside>\n      <div class=\"body\">\n        <p class=\"lede\">Clear aligner therapy is booming — projected to exceed <em>USD 56 billion<\u002Fem> by 2033. The chemistry underpinning production has not kept pace with the scrutiny it deserves.<\u002Fp>\n\n        <p>This paper examines the published evidence on three interrelated risks: <strong>patient safety<\u002Fstrong> (what leaches from resin into the mouth), <strong>occupational health<\u002Fstrong> (what laboratory and clinical staff breathe and absorb during printing, washing, and curing), and <strong>environmental impact<\u002Fstrong> (where hundreds of millions of non-recyclable thermoset models and contaminated solvents end up).<\u002Fp>\n\n        <p>The picture that emerges is not one of catastrophe — these materials can be managed safely when handled correctly. But it is a picture of significant gaps: in the evidence base (only three direct-print aligner resins have published biological evaluations), in occupational exposure standards (no UK Workplace Exposure Limit exists for the dominant methacrylate monomers released during printing), and in waste regulation (no dedicated classification pathway exists for thermoset dental photopolymer).<\u002Fp>\n\n        <p>As the industry moves toward putting resin directly in patients' mouths for 22 hours a day, these gaps become harder to ignore.<\u002Fp>\n\n        <div class=\"callout\">\n          <span class=\"tag\">[ The Question ]<\u002Fspan>\n          <p>For a profession built on <em>primum non nocere<\u002Fem>, should we be working so hard to optimise resin-based workflows when resin-free alternatives might be possible?<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"stats\">\n          <div class=\"stat\">\n            <span class=\"l\">Patient Safety<\u002Fspan>\n            <span class=\"v\">3<\u002Fspan>\n            <span class=\"n\">Direct-print aligner resins with published biological evaluations.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <span class=\"l\">Occupational<\u002Fspan>\n            <span class=\"v\">0<\u002Fspan>\n            <span class=\"n\">UK Workplace Exposure Limits for the four main resin VOCs.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <span class=\"l\">Environmental<\u002Fspan>\n            <span class=\"v\">728<span style=\"font-size: 28px;\">M<\u002Fspan><\u002Fspan>\n            <span class=\"n\">Plastic dental models generated worldwide — none recyclable.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SECTION 1 ============== -->\n<section class=\"section section--alt\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <aside class=\"colhead\">\n        <div class=\"num\">[<span class=\"br\">01<\u002Fspan>] / Patient Exposure<\u002Fdiv>\n        <div class=\"kicker\">What Leaches Into the Mouth<\u002Fdiv>\n        <h2>Two routes. Very different risk profiles.<\u002Fh2>\n        <div class=\"meta\">\n          <span>UDMA · BPA · TINUVIN 292<\u002Fspan>\n          <span>4 SUB-TOPICS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Faside>\n      <div class=\"body\">\n        <p class=\"lede\">There are two routes by which 3D printing resin enters the dental workflow — and the distinction matters <em>enormously<\u002Fem> for patient risk.<\u002Fp>\n\n        <div class=\"workflows\">\n          <div class=\"wf\">\n            <span class=\"tag\">[A] Conventional<\u002Fspan>\n            <h4>Thermoformed aligner<\u002Fh4>\n            <p>A resin model is printed; a thermoplastic sheet is formed over it. The patient wears the plastic, not the resin.<\u002Fp>\n            <div class=\"chain\">\n              <span class=\"step is-resin\">Resin Model<\u002Fspan>\n              <span class=\"arr\">→<\u002Fspan>\n              <span class=\"step\">Thermoplastic Sheet<\u002Fspan>\n              <span class=\"arr\">→<\u002Fspan>\n              <span class=\"step\">Patient<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"wf\">\n            <span class=\"tag\">[B] Direct-Print<\u002Fspan>\n            <h4>Printed aligner<\u002Fh4>\n            <p>The aligner itself is printed from resin and placed in the patient's mouth — for up to 22 hours a day.<\u002Fp>\n            <div class=\"chain\">\n              <span class=\"step is-resin\">Resin Aligner<\u002Fspan>\n              <span class=\"arr\">→<\u002Fspan>\n              <span class=\"step\">Patient<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 data-num=\"[01.1]\">Residual monomers: the polymerisation problem<\u002Fh3>\n        <p>No photopolymer resin cures completely. Under optimal conditions — nitrogen-atmosphere post-curing at validated wavelengths — conversion rates for commercial aligner resins reach <strong>83–97%<\u002Fstrong>. That still leaves a measurable fraction of unpolymerised monomer available to leach into saliva.<\u002Fp>\n        <p>Willi and colleagues at the University of Zurich quantified urethane dimethacrylate (UDMA) release from printed aligners at <strong>29–96 µg/L<\u002Fstrong>, with striking variability between specimens. When post-curing is suboptimal — conducted in air rather than nitrogen, or with incorrect timing — residual monomer levels rise substantially.<\u002Fp>\n        <p>A 2025 systematic review confirmed that direct-printed aligners consistently show <strong>higher cytotoxicity<\u002Fstrong> than their thermoformed equivalents, reinforcing the clinical significance of this leaching pathway. Common residual compounds include MMA, TEGDMA, HEMA, and Bis-GMA — substances known to cause cell death in oral tissues, DNA damage, and in some cases systemic effects.<\u002Fp>\n\n        <h3 data-num=\"[01.2]\">BPA: real but nuanced<\u002Fh3>\n        <p>Bisphenol A (BPA) is a well-characterised endocrine disruptor, and its presence in dental resins has understandably attracted attention. A European survey found that <strong>86.2% of dental composite resins<\u002Fstrong> are based on BPA derivatives. De Nys and colleagues at KU Leuven demonstrated that BPA arises both as a manufacturing impurity and through degradation under salivary and bacterial challenge.<\u002Fp>\n        <p>However, the picture is more nuanced than headlines suggest. The frequently cited claim of an \"88× increase in salivary BPA\" after dental material placement applies specifically to one discontinued sealant chemistry (bis-DMA-based), not to the Bis-GMA-based formulations used in most modern printing resins. Recent ultra-sensitive analyses place 24-hour BPA release at <strong>0.01–0.1 ng/mm³<\u002Fstrong> — well below the EFSA's revised tolerable daily intake. For leading direct-print aligner resins, <em>UDMA — not BPA — is the compound that warrants closest regulatory attention<\u002Fem>.<\u002Fp>\n\n        <h3 data-num=\"[01.3]\">Reproductive toxicity: the Tinuvin 292 finding<\u002Fh3>\n        <p>The single most consequential patient-safety finding in this field comes from Northwestern University. Rogers and colleagues tested two ISO-certified Formlabs dental resins — Dental SG and Dental LT — in a mammalian oocyte maturation assay. <strong>Dental LT caused complete oocyte degeneration<\u002Fstrong> regardless of surface treatment. Mass spectrometry identified Tinuvin 292, a hindered amine light stabiliser, as the culprit; isolated Tinuvin 292 reproduced the reproductive toxicity in dose-response.<\u002Fp>\n\n        <div class=\"callout\">\n          <span class=\"tag\">[ Key Finding ]<\u002Fspan>\n          <p>BASF classifies Tinuvin 292 as <em>\"suspected of damaging fertility\"<\u002Fem> and does not recommend it for mucous-membrane contact — yet it appeared in a resin marketed as biocompatible and intended for oral retainers.<\u002Fp>\n        <\u002Fdiv>\n\n        <p>The finding exposed a fundamental gap: ISO 10993 \"biocompatible\" certification has historically not required reproductive toxicity endpoints. Newer aligner resins such as Graphy Tera Harz do not contain Tinuvin 292, but the regulatory gap the study exposed remains unaddressed.<\u002Fp>\n\n        <h3 data-num=\"[01.4]\">Cytotoxicity: it's the process, not the label<\u002Fh3>\n        <p>Research published in 2025 converges on an important conclusion: <strong>biocompatibility is a system-level outcome, not an inherent property of a labelled resin<\u002Fstrong>. Bleilöb et al. found that cell viability decreased significantly as specimen thickness increased, and extending cure time did not compensate. Bor and colleagues showed that a simple pre-insertion water rinse materially reduces initial leachate exposure.<\u002Fp>\n        <p>No study has yet examined genotoxicity for any 3D-printed aligner resin, despite UDMA's known capacity to generate reactive oxygen species — a gap that sits uncomfortably alongside rapid clinical adoption.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SECTION 2 ============== -->\n<section class=\"section\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <aside class=\"colhead\">\n        <div class=\"num\">[<span class=\"br\">02<\u002Fspan>] / Occupational Health<\u002Fdiv>\n        <div class=\"kicker\">What Lab Staff Breathe &amp; Absorb<\u002Fdiv>\n        <h2>Volatile compounds. Sensitising chemicals. Permeating gloves.<\u002Fh2>\n        <div class=\"meta\">\n          <span>VOCs · UFPs · DERMATITIS<\u002Fspan>\n          <span>3 SUB-TOPICS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Faside>\n      <div class=\"body\">\n        <p class=\"lede\">If patient exposure is a story of <em>milligrams<\u002Fem>, occupational exposure is a story of <em>volatile compounds filling rooms<\u002Fem>.<\u002Fp>\n        <p>Both workflows — model printing and direct-print aligner production — expose staff to the same hazards.<\u002Fp>\n\n        <h3 data-num=\"[02.1]\">Airborne chemistry: VOCs and particles<\u002Fh3>\n        <p>The most comprehensive dental-specific air quality study to date — conducted by UL's Chemical Insights Research Institute at a university dental school — found that <strong>the 3D printing room had the highest total VOC levels of any area tested<\u002Fstrong>. A total of 29 chemicals classified as irritants, sensitisers, asthmagens, or developmental toxicants were identified, with formaldehyde exceeding California's chronic reference exposure level. Particle emissions in the printing room were dominated by ultrafine particles under 100 nm.<\u002Fp>\n\n        <p>Baguley and colleagues at the University of Leicester and HSE synthesised 47 emissions studies and concluded that current evidence identifies circumstances where 3D printer operators face exposures for which no regulatory limits apply. Their follow-up experimental work on a Formlabs Form 2 recorded enclosed-chamber TVOC exceeding <strong>128,000 µg/m³<\u002Fstrong>, and room-level TVOC of 45–116 µg/m³ at half a metre from the printer.<\u002Fp>\n\n        <div class=\"stats\">\n          <div class=\"stat\">\n            <span class=\"l\">IPA Wash Phase<\u002Fspan>\n            <span class=\"v\">36.8<sup>mg/m³<\u002Fsup><\u002Fspan>\n            <span class=\"n\">TVOC during rinsing — 300× higher than printing itself.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <span class=\"l\">Print Chamber<\u002Fspan>\n            <span class=\"v\">128<sup>k<\u002Fsup><\u002Fspan>\n            <span class=\"n\">µg/m³ TVOC inside enclosed chamber (Form 2 study).<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <span class=\"l\">Enclosure Effect<\u002Fspan>\n            <span class=\"v\">99.7%<\u002Fspan>\n            <span class=\"n\">Particle reduction with ventilated enclosure controls.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p>Perhaps the most surprising finding: <strong>the post-print IPA wash — not the printing itself — is the highest-VOC phase of the workflow<\u002Fstrong>. Bowers et al. recorded TVOC up to 36.8 mg/m³ during rinsing versus 0.1 mg/m³ during printing — a 300-fold difference. García-González and colleagues found TVOC in resin printing samples ranging 22–1,918 µg/m³, with several exceeding the WHO indoor guideline of 200 µg/m³.<\u002Fp>\n\n        <h3 data-num=\"[02.2]\">Skin contact: a sensitisation time bomb<\u002Fh3>\n        <p>Fenech et al. reported the first published case of occupational allergic contact dermatitis from 3D-printing methacrylates in a dental technician, warning of a potential <em>\"epidemic\"<\u002Fem> in the profession. The concern is compounded by Sananez and colleagues' demonstration that <strong>methacrylate monomers permeate standard nitrile gloves<\u002Fstrong>, meaning standard disposable gloves provide only short-duration protection.<\u002Fp>\n        <p>Once sensitised, the reaction is effectively permanent. HEMA was added to the European Baseline Series for patch testing in 2019, reflecting growing clinical recognition of the problem.<\u002Fp>\n\n        <h3 data-num=\"[02.3]\">The awareness gap<\u002Fh3>\n        <p>Survey data consistently indicate that many dental practitioners lack awareness of the VOC and particle emission risks associated with their 3D printers. This is compounded by a regulatory gap: <strong>UK HSE's own field data confirms that the four main VOCs detected at UK resin-printing workplaces have no specific Workplace Exposure Limit<\u002Fstrong>. Occupational control therefore falls under COSHH's general duty of \"as low as reasonably practicable\" — a weaker lever than a named WEL, and one that assumes employers know the risk exists in the first place.<\u002Fp>\n\n        <div class=\"callout\">\n          <span class=\"tag\">[ Mitigation ]<\u002Fspan>\n          <p>Ventilated enclosures reduce particle concentrations by <em>99.7%<\u002Fem> and TVOC by <em>69.5%<\u002Fem>. The challenge: these controls are not standard in most dental laboratories, and compliance guidance specific to resin printing remains limited.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SECTION 3 ============== -->\n<section class=\"section section--alt\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <aside class=\"colhead\">\n        <div class=\"num\">[<span class=\"br\">03<\u002Fspan>] / Environmental<\u002Fdiv>\n        <div class=\"kicker\">Where It All Ends Up<\u002Fdiv>\n        <h2>Thermoset polymers. No circular pathway.<\u002Fh2>\n        <div class=\"meta\">\n          <span>WASTE · LEACHATE · MICROPLASTICS<\u002Fspan>\n          <span>3 SUB-TOPICS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Faside>\n      <div class=\"body\">\n        <p class=\"lede\">The environmental dimension of dental 3D printing rarely features in clinical decision-making. <em>The numbers are striking.<\u002Fem><\u002Fp>\n\n        <h3 data-num=\"[03.1]\">The scale of dental model waste<\u002Fh3>\n        <p>Slaymaker and colleagues calculated that an estimated <strong>14 million patients<\u002Fstrong> treated with clear aligners have generated roughly <strong>728 million plastic models<\u002Fstrong> and a comparable number of aligners. Each model is used once and discarded.<\u002Fp>\n        <p>Because SLA and DLP-printed dental models are thermoset polymers — permanent chemical crosslinks that cannot be melted, reformed, or recycled — every single one is destined for landfill or incineration. <em>There is no circular waste pathway.<\u002Fem> With the market growing at approximately 13–27% CAGR depending on the forecast, the waste burden is substantial and accelerating.<\u002Fp>\n\n        <h3 data-num=\"[03.2]\">What happens in landfill<\u002Fh3>\n        <p>Cured resin does not sit quietly in the ground. Oskui et al. exposed zebrafish embryos to SLA-printed parts and observed <strong>over 50% mortality by day three and 100% mortality by day seven<\u002Fstrong>, with 100% of surviving hatchlings showing developmental abnormalities. Walpitagama and colleagues demonstrated that SLA plastic leachates cause developmental toxicity and neurobehavioural alterations in zebrafish larvae, identifying unpolymerised photoinitiator as the primary leachate.<\u002Fp>\n\n        <div class=\"stats\">\n          <div class=\"stat\">\n            <span class=\"l\">Aquatic Toxicity<\u002Fspan>\n            <span class=\"v\">2.6<sup>mg/L<\u002Fsup><\u002Fspan>\n            <span class=\"n\">Acute toxicity for uncured resin feedstocks (Ballentine et al.).<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <span class=\"l\">Reproductive Inhibition<\u002Fspan>\n            <span class=\"v\">0.33<sup>mg/L<\u002Fsup><\u002Fspan>\n            <span class=\"n\">Threshold in aquatic organisms — orders below acute.<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"stat\">\n            <span class=\"l\">Zebrafish Mortality<\u002Fspan>\n            <span class=\"v\">100%<\u002Fspan>\n            <span class=\"n\">By day seven of exposure to SLA-printed parts.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p>Ballentine et al. reported acute toxicity values as low as 2.6 mg/L for uncured resin feedstocks, with reproductive inhibition in aquatic organisms at just 0.33 mg/L. Critically, Ballentine identified <strong>cleaning and waste management procedures — where contaminated solvents are disposed of — as potentially the most hazardous environmental step<\u002Fstrong>.<\u002Fp>\n        <p>Under UK Hazardous Waste Regulations, contaminated IPA requires classified disposal, but compliance in smaller dental laboratories is inconsistent at best.<\u002Fp>\n\n        <h3 data-num=\"[03.3]\">Microplastics: an emerging concern<\u002Fh3>\n        <p>Microplastic shedding from dental appliances is an emerging area of research. Quinzi et al. provided the first spectroscopic evidence of secondary microplastic detachment from clear aligners after just <strong>seven days in artificial saliva<\u002Fstrong>, with significant variation between brands. Both thermoformed and printed appliances shed particles in the 5–20 µm range.<\u002Fp>\n        <p>Over time, discarded models and aligners fragment further, releasing additives and absorbed chemicals into soil and groundwater. Endocrine disruption in aquatic organisms has been documented at parts-per-trillion BPA concentrations.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SECTION 4 ============== -->\n<section class=\"section\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <aside class=\"colhead\">\n        <div class=\"num\">[<span class=\"br\">04<\u002Fspan>] / Regulation<\u002Fdiv>\n        <div class=\"kicker\">Gaps Worth Knowing About<\u002Fdiv>\n        <h2>\"Biocompatible\" is a marketing claim, not a regulatory status.<\u002Fh2>\n        <div class=\"meta\">\n          <span>ISO 10993 · MHRA · FDA · MDR<\u002Fspan>\n          <span>4 KEY GAPS<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Faside>\n      <div class=\"body\">\n        <p class=\"lede\">The regulatory architecture around dental 3D printing is, to put it charitably, <em>a work in progress<\u002Fem>.<\u002Fp>\n\n        <p>If history teaches us anything, it is that regulation alone is not a guarantee. The PIP breast implant scandal is a case in point: a French manufacturer quietly substituted industrial-grade silicone for medical-grade in implants destined for 400,000 women worldwide, and went undetected for over a decade. Regulatory inspections were announced in advance, no unannounced checks of the implants' chemical composition were required after initial approval, and the certification body never caught the switch.<\u002Fp>\n\n        <p>The fallout — mass recalls, criminal convictions, and the EU's most significant medical device regulatory overhaul in a generation — is a reminder that <strong>\"approved\" and \"certified\" are only as reliable as the systems behind them<\u002Fstrong>. In an industry where 3D printing is decentralising production to hundreds of labs and chairside practices, each running its own post-processing protocols, the question of who is checking what matters a great deal.<\u002Fp>\n\n        <h3 data-num=\"[04.1]\">\"Biocompatible\" — a marketing claim<\u002Fh3>\n        <p>Goodridge and colleagues surveyed 99 commercially marketed \"biocompatible\" 3D-printing resins and found that of 28 that cited ISO 10993-1, <strong>only 8 provided details of the risk-evaluation endpoints actually tested<\u002Fstrong>. Testing often covers the raw liquid resin rather than the post-cured finished device — a distinction with real clinical consequences.<\u002Fp>\n\n        <h3 data-num=\"[04.2]\">FDA: Class I vs Class II<\u002Fh3>\n        <p>The FDA distinguishes between Class I devices (dental models, surgical guides — low risk) and Class II devices (intraoral appliances like aligners — requiring 510(k) clearance). <strong>A resin cleared as a dental model material is not approved for use as an aligner<\u002Fstrong>, yet the same chemistry can be marketed for both depending on how it is used downstream.<\u002Fp>\n        <p>The Pew Charitable Trusts' 2022 analysis identified three persistent FDA gaps: unclear alignment with the existing risk-based framework, unclear actor-specific requirements, and an unresolved definition of \"manufacturer\" in the point-of-care context.<\u002Fp>\n\n        <h3 data-num=\"[04.3]\">ISO 10993 was not built for this<\u002Fh3>\n        <p>ISO 10993 itself assumes a fixed, manufactured product — a paradigm that the <em>\"lot size of one\"<\u002Fem> economics of 3D printing directly contradicts. The standard contains no protocol for wash-solvent choice, cure wavelength, atmosphere, duration, or patient-matched geometry. <strong>Post-processing variability is therefore the single largest uncontrolled variable in biocompatibility<\u002Fstrong>, and the evidence consistently shows it.<\u002Fp>\n\n        <h3 data-num=\"[04.4]\">UK &amp; EU divergence<\u002Fh3>\n        <p>In the UK, custom-made dental devices fall under the MHRA's custom-made device regime, with new annual registration fees applying from April 2026. The UK Medical Devices Regulations remain based on the older EU Medical Device Directive 93/42/EEC, not the stricter 2017 EU MDR — a divergence that affects laboratories serving both GB and EU/NI markets.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== SECTION 5 ============== -->\n<section class=\"section section--alt\">\n  <div class=\"container\">\n    <div class=\"grid\">\n      <aside class=\"colhead\">\n        <div class=\"num\">[<span class=\"br\">05<\u002Fspan>] / Conclusion<\u002Fdiv>\n        <div class=\"kicker\">Where This Leaves the Industry<\u002Fdiv>\n        <h2>The chemistry is not the villain. Inadequate process control is.<\u002Fh2>\n        <div class=\"meta\">\n          <span>FINAL READING<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Faside>\n      <div class=\"body\">\n        <p class=\"lede\">None of this means dental 3D printing is unsafe. With proper protocols, the risks described here are <em>manageable<\u002Fem>.<\u002Fp>\n\n        <p>But the cumulative picture — thin biocompatibility evidence, absent occupational exposure limits, unclassified waste streams, and a label (\"biocompatible\") that means less than most clinicians assume — raises a fundamental question about direction.<\u002Fp>\n\n        <p>The industry is investing enormous energy in optimising resin-based workflows: better resins, better printers, better post-curing. <strong>Direct 3D printing of aligners eliminates the model but still places cured photopolymer in the patient's mouth<\u002Fstrong>, with all the leaching, waste, and occupational exposure that entails.<\u002Fp>\n\n        <p>Meanwhile, the thermoforming approach — shaping a well-characterised, clinically proven thermoplastic sheet around a form — remains the dominant production method precisely because <em>it keeps resin away from the patient<\u002Fem>. PETG, polyurethane, and co-polyester blanks have decades of clinical use data and well-established biocompatibility profiles that no direct-print resin can yet match. They generate no VOCs in use, require no chemical washing, and create no solvent waste streams.<\u002Fp>\n\n        <p>The weakness of thermoforming has always been the model: you still need a 3D-printed resin mould for each aligner stage, and those models account for the bulk of the occupational exposure and environmental waste in Workflow A.<\u002Fp>\n\n        <div class=\"callout\">\n          <span class=\"tag\">[ The Opportunity ]<\u002Fspan>\n          <p>Eliminate the model, and you <em>eliminate the resin entirely<\u002Fem>.<\u002Fp>\n        <\u002Fdiv>\n\n        <p>There is a clear and growing space in the market for manufacturing approaches that deliver the precision of digital workflows and the safety of thermoformed materials — without resin at all. Technologies that can form standard biocompatible thermoplastic blanks directly from digital data, bypassing the printed model, would address the largest sources of occupational exposure, environmental waste, and patient-safety uncertainty in the current workflow — without introducing the additional concerns that come with putting photopolymer resin in someone's mouth for 22 hours a day.<\u002Fp>\n\n        <p style=\"font-family: var(--fy-font-display); font-size: 28px; line-height: 1.25; letter-spacing: -0.01em; color: var(--fy-fg-1); max-width: 32ch; margin-top: 40px;\">The evidence suggests the industry would do well to look beyond <em style=\"color: var(--fy-teal);\">better resin<\u002Fem> — and start asking whether it needs resin at all.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== CLOSING ============== -->\n<section class=\"closing\">\n  <div class=\"closing__bg\"><img src=\"422959c4-53e0-44c7-8e69-f3c148a4741c\" alt=\"\"><\u002Fdiv>\n  <div class=\"closing__inner\">\n    <span class=\"eyebrow\">[06] / Forming the Future<\u002Fspan>\n    <h2>A future where digital precision meets <em>resin-free<\u002Fem> manufacturing.<\u002Fh2>\n    <p style=\"font-size: 19px; line-height: 1.5; color: var(--fy-fg-3); max-width: 64ch; margin: 32px 0 0;\">\n      Fyous builds <span class=\"curly\">polymorphic<\u002Fspan> manufacturing systems — reconfigurable forming machines that shape standard biocompatible thermoplastic blanks directly from digital data. No model. No photopolymer. No solvent waste stream.\n    <\u002Fp>\n    <div class=\"closing__cta-row\">\n      <a class=\"cta cta--primary\" href=\"https://www.fyous.com\" target=\"_blank\" rel=\"noopener\">\n        Book A Demo <span>→<\u002Fspan>\n      <\u002Fa>\n      <a class=\"cta cta--ghost\" href=\"https://www.fyous.com/dental\" target=\"_blank\" rel=\"noopener\">\n        Dental Applications <span>→<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== FOOTER ============== -->\n<footer class=\"footer\">\n  <div class=\"footer__inner\">\n    <div class=\"disclaim\">\n      <h4>Disclaimer<\u002Fh4>\n      <p style=\"margin: 0;\">This paper summarises published research and is intended for informational purposes. It does not constitute medical, legal, or regulatory advice. Readers should verify claims against the cited sources and consult appropriate professionals for specific applications.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"col\">\n      <span class=\"label\">Published<\u002Fspan>\n      <span class=\"v\">FYOUS LTD<\u002Fspan>\n      <span class=\"v\">SHEFFIELD, UK<\u002Fspan>\n      <span class=\"v\" style=\"color: var(--fy-teal);\">WWW.FYOUS.COM<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"col\">\n      <span class=\"label\">Document<\u002Fspan>\n      <span class=\"v\">THE RESIN QUESTION<\u002Fspan>\n      <span class=\"v\">v1.0 · APR 2026<\u002Fspan>\n      <span class=\"v\">© 2026 FYOUS LTD<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer__base\">\n    <div class=\"footer__brand\">\n      <img src=\"fc955b4c-baee-4780-9e54-419aabb59a73\" alt=\"Fyous\">\n      <span>FORMING THE FUTURE<\u002Fspan>\n    <\u002Fdiv>\n    <span>[ END OF DOCUMENT ]<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
